hydra:
  searchpath:
    - file://verl/trainer/config

defaults:
  - ppo_trainer
  - _self_

trainer:
  iteration_state_path: ${iteration.state_path}

data:
  # all preserves the legacy single-process flow. iter1_gen_data.sh uses generate
  # then verify so both phases can independently use all GPUs.
  phase: all
  # 2048 (not 1536): proposer prompts are built to fit 1536 WITHOUT tools, but sglang
  # re-applies the chat template WITH the search tool schema at rollout, pushing some
  # prompts past 1536. schemas.py does not truncate (only warns), so an over-length
  # prompt makes per-DP-worker prompt tensors differ and DataProto.concat fails. The
  # tool schema adds ~40 tokens, so 2048 leaves ample headroom and keeps padding uniform.
  max_prompt_length: 2048
  max_response_length: 2560
  train_batch_size: 256
  return_raw_chat: True
  shuffle: False
  use_proposer_iteration_prompt: false
  proposer_iteration_state_path: ${iteration.state_path}
  candidates_path: null
  candidate_manifest_path: null
  candidate_progress_path: null
  resume_candidates: true
  keepout_path: null
  split_manifest_path: null
  generation_summary_path: null

iteration:
  state_path: ${oc.env:DRZERO_ITERATION_STATE,null}
  candidate_count_per_document: 5
  solver_train_ratio: 0.9
  split_seed: 42

verify:
  enabled: true
  # Run three samples with evidence and three question-only samples. Passing
  # requires >=1 normalized exact match in the first group and 0 in the second.
  solver_samples: 3
  max_group_concurrency: 32
  allow_search: false
  # Verifier (answer sampling) is the round-start solver being trained; do not point
  # this at a fixed auxiliary model.
  solver_model:
    model_name: ${oc.env:DRZERO_SOLVER_BEFORE,Qwen/Qwen3-4B-Instruct-2507}
    base_url: "http://127.0.0.1:8001"
    api_key_env: null
    timeout_seconds: 120
    max_retries: 3
    max_concurrency: 32
  # main_generation releases all generation workers, then starts this solver only
  # for the serial verify phase. Training scripts opt in explicitly.
  local_server:
    enabled: false
    model_path: ${verify.solver_model.model_name}
    gpu_devices: "2"
    port: 8001
    tp_size: 1
    mem_fraction_static: 0.8
    startup_timeout_seconds: 300
    log_path: logs/verify_solver.log

keepout_eval:
  retrieval_service_url: ${oc.env:DRZERO_RETRIEVER_URL,"http://127.0.0.1:8020/retrieve"}
  topk: 3
  max_turns: 5
  solver_model:
    model_name: ${oc.env:DRZERO_SOLVER_AFTER,solver-after}
    base_url: "http://127.0.0.1:8001"
    api_key_env: null
    timeout_seconds: 120
    max_retries: 3
    max_concurrency: 32

trajectory_analysis:
  chunk_size: 50

proposer_reward:
  format_weight: 0.5
  difficulty_weight: 1.0
  rubric_weight: 0.5

dynamic_state:
  max_skills: 12
  max_rubrics: 12
  max_retries: 3

# Local Qwen3.6 service shared by all semantic judge/scoring calls. Start it with
# setup_qwen36_judge.sh before running the iteration. Environment overrides make it
# possible to move the service without editing the pipeline scripts.
meta_model:
  model_name: ${oc.env:DRZERO_META_MODEL,Qwen/Qwen3.6-35B-A3B}
  base_url: ${oc.env:DRZERO_META_BASE_URL,"http://127.0.0.1:8000"}
  api_key_env: ${oc.env:DRZERO_META_API_KEY_ENV,null}
  timeout_seconds: 120
  max_retries: 3
  max_concurrency: 32

# Skills/rubrics update uses a separately named endpoint so it never silently falls
# back to a training model. By default it reuses the same local Qwen3.6 server.
updater_model:
  model_name: ${oc.env:DRZERO_UPDATER_MODEL,Qwen/Qwen3.6-35B-A3B}
  base_url: ${oc.env:DRZERO_UPDATER_BASE_URL,"http://127.0.0.1:8000"}
  api_key_env: ${oc.env:DRZERO_UPDATER_API_KEY_ENV,null}
  timeout_seconds: 120
  max_retries: 3
  max_concurrency: 32

actor_rollout_ref:
  hybrid_engine: True
  rollout:
    name: sglang
    multi_turn:
      enable: True
      max_assistant_turns: 5
      max_parallel_calls: 64
      max_tool_response_length: 512
      format: qwen

custom_reward_function:
  reward_kwargs:
    model_name: ${verify.solver_model.model_name}
    base_url: "http://127.0.0.1:8001"
    reward_rollout_n: 4
    iteration_state_path: ${iteration.state_path}
    proposer_reward: ${proposer_reward}
    meta_model: ${meta_model}
    solver_max_concurrency: 64
